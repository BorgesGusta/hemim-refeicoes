<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in de Refeições - HEMIM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
  body { margin: 0; padding: 16px; background: #f4f6f8; color: #1a1a1a; }
  .card { background: #fff; border-radius: 12px; padding: 20px; max-width: 480px; margin: 24px auto; box-shadow: 0 1px 6px rgba(0,0,0,0.10); }
  h1 { font-size: 20px; margin: 0 0 14px; }
  input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
  button { padding: 11px 18px; border: none; border-radius: 8px; background: #1F4E78; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
  .hidden { display: none; }
  .topo { max-width: 480px; margin: 24px auto 0; text-align: center; }
  .topo img { width: 100%; max-width: 200px; height: auto; display: block; margin: 0 auto; }
  .ajuda { font-size: 13px; color: #666; margin: -4px 0 12px; }
  .msg-erro { color: #c0392b; font-size: 13px; margin-top: -4px; margin-bottom: 10px; font-weight: 600; }
  .campo-senha { position: relative; margin-bottom: 10px; }
  .campo-senha input { margin-bottom: 0; padding-right: 42px; }
  .btn-olho { position: absolute; top: 0; right: 0; height: 100%; width: 42px; background: transparent; border: none; padding: 0; display: flex; align-items: center; justify-content: center; color: #999; cursor: pointer; }
  .btn-olho:hover { color: #1F4E78; }
  .btn-olho svg { width: 18px; height: 18px; }
  .abas-refeicao { display: flex; gap: 8px; margin-bottom: 14px; }
  .abas-refeicao button { flex: 1; background: #e9eef5; color: #1F4E78; }
  .abas-refeicao button.ativa { background: #1F4E78; color: #fff; }
  .resumo-checkin { background: #eef2f8; border-radius: 8px; padding: 10px 12px; margin-bottom: 12px; font-size: 14px; font-weight: 600; text-align: center; }
  .linha-checkin { display: flex; align-items: center; gap: 10px; padding: 13px; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 8px; cursor: pointer; user-select: none; }
  .linha-checkin.entregue { background: #e8f5ec; border-color: #b7dfc3; }
  .linha-checkin .check { font-size: 18px; }
  .linha-checkin .nome-checkin { flex: 1; font-size: 15px; }
  .linha-checkin .setor-checkin { font-size: 12px; color: #888; }
  .operador-ativo { font-size: 12px; color: #1a7f37; margin-bottom: 10px; }
  .sair-link { font-size: 12px; color: #1F4E78; text-decoration: underline; cursor: pointer; }
  .rodape { text-align: center; font-size: 11px; color: #999; margin: 24px auto 12px; max-width: 480px; }
  @media (max-width: 480px) {
    body { padding: 12px; }
    .card { margin: 16px auto; padding: 16px; }
  }
</style>
</head>
<body>
  <div class="topo">
    <img src="assets/logo.png" alt="Hospital Regional Materno Infantil de Marabá">
  </div>
  <div class="card">
    <h1>Check-in de Refeições</h1>

    <div id="telaAcesso">
      <p class="ajuda">Digite seu nome e o código pessoal de acesso:</p>
      <input id="nomeOperador" placeholder="Seu nome completo">
      <div class="campo-senha">
        <input id="codigoOperador" type="password" placeholder="Código de acesso" onkeydown="if(event.key==='Enter') confirmarAcesso()">
        <button type="button" class="btn-olho" onclick="alternarCodigo()" aria-label="Mostrar código">
          <svg id="svgOlho" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>
      <button onclick="confirmarAcesso()">Entrar</button>
      <div id="msgAcesso" class="msg-erro"></div>
    </div>

    <div id="painelCheckin" class="hidden">
      <div class="operador-ativo">Conferindo como: <b id="nomeOperadorAtivo"></b> — <span class="sair-link" onclick="sair()">trocar</span></div>
      <div class="abas-refeicao">
        <button id="abaCafe" class="ativa" onclick="selecionarRefeicao('Cafe')">Café</button>
        <button id="abaAlmoco" onclick="selecionarRefeicao('Almoco')">Almoço</button>
        <button id="abaLanche" onclick="selecionarRefeicao('Lanche')">Lanche</button>
      </div>
      <input id="buscaNome" placeholder="Buscar por nome..." oninput="renderLista()">
      <div id="contador" class="resumo-checkin"></div>
      <div id="listaCheckin"></div>
    </div>
  </div>

  <div class="rodape">Sistema desenvolvido por Agëncia Grow. Ferramenta de apoio operacional, sem vínculo oficial com a administração do hospital.</div>

<script>
  // ===== PREENCHA AQUI COM OS DADOS DO SEU PROJETO SUPABASE =====
  const SUPABASE_URL = 'https://ymghyblozlpmcbirgvvf.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_h_cLHj3b_hzu8jOA0Lj-Gw_Dt7YTgWw';
  // ================================================================

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let operador = { nome: '', codigo: '' };
  let refeicaoAtual = 'Cafe';
  let listaAtual = [];

  function normalizar(texto) {
    return String(texto || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ');
  }

  function alternarCodigo() {
    const campo = document.getElementById('codigoOperador');
    const vaiMostrar = campo.type === 'password';
    campo.type = vaiMostrar ? 'text' : 'password';
    document.getElementById('svgOlho').innerHTML = vaiMostrar
      ? '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.34 18.34 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
  }

  async function confirmarAcesso() {
    const nome = document.getElementById('nomeOperador').value.trim();
    const codigo = document.getElementById('codigoOperador').value.trim();
    document.getElementById('msgAcesso').textContent = '';

    if (!nome || !codigo) {
      document.getElementById('msgAcesso').textContent = 'Preencha seu nome e o código de acesso.';
      return;
    }

    const { data, error } = await supabaseClient.rpc('validar_operador_checkin', { nome_input: nome, codigo_input: codigo });
    if (error || !data || data.length === 0) {
      document.getElementById('msgAcesso').textContent = 'Nome ou código incorretos.';
      return;
    }

    operador = { nome: data[0].nome, codigo: codigo };
    document.getElementById('nomeOperadorAtivo').textContent = operador.nome;
    document.getElementById('telaAcesso').classList.add('hidden');
    document.getElementById('painelCheckin').classList.remove('hidden');
    carregarLista();
  }

  function sair() {
    operador = { nome: '', codigo: '' };
    document.getElementById('nomeOperador').value = '';
    document.getElementById('codigoOperador').value = '';
    document.getElementById('msgAcesso').textContent = '';
    document.getElementById('painelCheckin').classList.add('hidden');
    document.getElementById('telaAcesso').classList.remove('hidden');
  }

  function selecionarRefeicao(ref) {
    refeicaoAtual = ref;
    document.getElementById('abaCafe').classList.toggle('ativa', ref === 'Cafe');
    document.getElementById('abaAlmoco').classList.toggle('ativa', ref === 'Almoco');
    document.getElementById('abaLanche').classList.toggle('ativa', ref === 'Lanche');
    carregarLista();
  }

  async function carregarLista() {
    const hoje = new Date().toISOString().slice(0, 10);
    document.getElementById('listaCheckin').innerHTML = '<p class="ajuda">Carregando...</p>';

    const { data, error } = await supabaseClient.rpc('obter_lista_checkin', {
      nome_input: operador.nome,
      codigo_input: operador.codigo,
      data_input: hoje,
      refeicao_input: refeicaoAtual
    });

    if (error) {
      document.getElementById('listaCheckin').innerHTML = '<p class="msg-erro">Erro: ' + error.message + '</p>';
      return;
    }

    listaAtual = data || [];
    renderLista();
  }

  function renderLista() {
    const entregues = listaAtual.filter(p => p.entregue).length;
    document.getElementById('contador').textContent = entregues + ' de ' + listaAtual.length + ' já entregue(s)';

    const termo = normalizar(document.getElementById('buscaNome').value);
    const filtrada = termo
      ? listaAtual.filter(p => normalizar(p.nome).indexOf(termo) !== -1)
      : listaAtual;

    if (filtrada.length === 0) {
      document.getElementById('listaCheckin').innerHTML = '<p class="ajuda">Nenhum pedido encontrado.</p>';
      return;
    }

    let html = '';
    filtrada
      .slice()
      .sort((a, b) => a.nome.localeCompare(b.nome, 'pt-BR'))
      .forEach(p => {
        html += '<div class="linha-checkin' + (p.entregue ? ' entregue' : '') + '" onclick="alternarEntrega(' + p.id + ')">' +
          '<span class="check">' + (p.entregue ? '✅' : '⬜') + '</span>' +
          '<span class="nome-checkin">' + p.nome + '</span>' +
          '<span class="setor-checkin">' + p.setor + '</span>' +
          '</div>';
      });
    document.getElementById('listaCheckin').innerHTML = html;
  }

  async function alternarEntrega(id) {
    const item = listaAtual.find(p => p.id === id);
    if (!item) return;
    const novoStatus = !item.entregue;

    const { error } = await supabaseClient.rpc('marcar_entrega', {
      nome_input: operador.nome,
      codigo_input: operador.codigo,
      pedido_id: id,
      refeicao_input: refeicaoAtual,
      entregar: novoStatus
    });

    if (error) {
      alert('Erro ao registrar: ' + error.message);
      return;
    }

    item.entregue = novoStatus;
    renderLista();
  }
</script>
</body>
</html>
